<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>GREEN ROOM · 골프레슨 쇼츠</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Gothic+A1:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0e0c; --bg2:#111815; --card:#161d19;
    --fair:#1f7a4d; --fair-glow:#2ee88a; --gold:#c9a86a;
    --text:#eef2ef; --muted:#7d8a83; --line:rgba(255,255,255,.07);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--bg);color:var(--text);font-family:'Gothic A1',sans-serif;overflow-x:hidden}
  body{
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(46,232,138,.08), transparent 60%),
      radial-gradient(900px 500px at -10% 20%, rgba(201,168,106,.06), transparent 55%),
      var(--bg);
    min-height:100vh;padding-bottom:100px;
  }
  header{
    position:sticky;top:0;z-index:50;padding:16px 18px 14px;
    background:linear-gradient(180deg, rgba(10,14,12,.96) 60%, rgba(10,14,12,0));
    backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:space-between;
  }
  .brand{display:flex;align-items:baseline;gap:10px}
  .brand .mark{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:2px;line-height:1;
    background:linear-gradient(120deg,var(--fair-glow),var(--gold));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .brand .sub{font-size:11px;color:var(--muted);letter-spacing:3px;font-weight:700}
  .addbtn{border:1px solid var(--line);background:var(--card);color:var(--text);
    width:42px;height:42px;border-radius:14px;font-size:22px;cursor:pointer;
    display:grid;place-items:center;transition:.2s}
  .addbtn:active{transform:scale(.9);border-color:var(--fair-glow)}
  .hero{margin:6px 18px 22px;border-radius:22px;overflow:hidden;position:relative;
    min-height:190px;display:flex;align-items:flex-end;
    background:linear-gradient(135deg,#0e2a1c,#08110d);border:1px solid var(--line)}
  .hero::before{content:"";position:absolute;inset:0;
    background:radial-gradient(400px 200px at 85% 15%, rgba(46,232,138,.25), transparent 70%),
      repeating-linear-gradient(115deg, rgba(255,255,255,.02) 0 2px, transparent 2px 22px)}
  .hero-ball{position:absolute;right:22px;top:26px;width:74px;height:74px;border-radius:50%;
    background:radial-gradient(circle at 32% 28%, #fff, #cdd3ce 60%, #8a938c);
    box-shadow:0 20px 40px rgba(0,0,0,.5), inset -6px -8px 14px rgba(0,0,0,.25);
    animation:float 4s ease-in-out infinite}
  @keyframes float{50%{transform:translateY(-10px)}}
  .hero-copy{position:relative;padding:22px 20px;z-index:2}
  .hero-copy h1{font-size:26px;font-weight:900;line-height:1.15;letter-spacing:-.5px}
  .hero-copy p{color:var(--muted);font-size:13px;margin-top:8px;font-weight:500}
  .hero-stat{margin-top:14px;display:inline-flex;gap:8px;align-items:center;
    font-family:'Bebas Neue';letter-spacing:1px;font-size:15px;color:var(--fair-glow)}
  .hero-stat b{font-size:26px}
  .chips{display:flex;gap:9px;overflow-x:auto;padding:0 18px 4px;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;padding:9px 16px;border-radius:100px;border:1px solid var(--line);
    background:var(--bg2);color:var(--muted);font-size:13px;font-weight:700;cursor:pointer;
    transition:.2s;white-space:nowrap}
  .chip.on{background:var(--fair);color:#fff;border-color:transparent;box-shadow:0 6px 18px rgba(31,122,77,.4)}
  .row{margin-top:26px}
  .row-head{display:flex;align-items:center;justify-content:space-between;padding:0 18px 12px}
  .row-head h2{font-size:17px;font-weight:900;letter-spacing:-.3px;display:flex;gap:9px;align-items:center}
  .row-head h2 .ic{font-size:19px}
  .row-head .cnt{font-size:12px;color:var(--muted);font-weight:700}
  .track{display:flex;gap:13px;overflow-x:auto;padding:2px 18px 6px;scrollbar-width:none;scroll-snap-type:x mandatory}
  .track::-webkit-scrollbar{display:none}
  .card{flex:0 0 auto;width:148px;scroll-snap-align:start;cursor:pointer;animation:pop .5s backwards}
  @keyframes pop{from{opacity:0;transform:translateY(14px)}}
  .thumb{width:148px;height:263px;border-radius:16px;overflow:hidden;position:relative;
    background:linear-gradient(160deg,#1c2620,#0d1310);border:1px solid var(--line);transition:.25s}
  .card:active .thumb{transform:scale(.95)}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block}
  /* ===== 자동 생성 카드 (썸네일 없을 때) ===== */
  .thumb .noimg{position:absolute;inset:0;display:flex;flex-direction:column;
    justify-content:space-between;padding:14px 13px;overflow:hidden;
    background:linear-gradient(160deg, var(--g1,#1c2620), var(--g2,#0d1310))}
  .thumb .noimg::before{content:"";position:absolute;inset:0;
    background:
      radial-gradient(120px 120px at 78% 22%, rgba(255,255,255,.14), transparent 65%),
      repeating-linear-gradient(115deg, rgba(255,255,255,.05) 0 1px, transparent 1px 13px);
    mix-blend-mode:soft-light;opacity:.9}
  .thumb .noimg::after{content:"";position:absolute;left:-30%;bottom:-38%;
    width:150%;height:60%;border-radius:50%;
    background:radial-gradient(circle at 50% 0%, rgba(255,255,255,.16), transparent 60%);
    transform:rotate(-8deg)}
  .thumb .noimg .big{position:relative;font-size:40px;filter:drop-shadow(0 4px 10px rgba(0,0,0,.4));
    align-self:flex-end;opacity:.95}
  .thumb .noimg .auto-cat{position:relative;font-family:'Bebas Neue';font-size:13px;letter-spacing:2px;
    color:rgba(255,255,255,.7);text-transform:uppercase}
  .thumb .noimg .auto-title{position:relative;font-size:14px;font-weight:900;line-height:1.3;
    color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.5);
    display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .thumb .noimg .auto-line{position:relative;width:34px;height:3px;border-radius:2px;
    background:rgba(255,255,255,.55);margin-bottom:2px}
  .thumb .play{position:absolute;inset:0;display:grid;place-items:center;
    background:linear-gradient(180deg,transparent 40%,rgba(0,0,0,.75));opacity:0;transition:.25s}
  .card:hover .play{opacity:1}
  .thumb .play span{width:52px;height:52px;border-radius:50%;background:rgba(46,232,138,.92);
    display:grid;place-items:center;color:#04120a;font-size:20px;padding-left:3px;
    box-shadow:0 8px 24px rgba(0,0,0,.5)}
  .thumb .badge{position:absolute;top:9px;left:9px;font-size:10px;font-weight:900;padding:4px 8px;
    border-radius:7px;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);color:var(--fair-glow);letter-spacing:.5px}
  .thumb .num{position:absolute;top:9px;right:11px;font-family:'Bebas Neue';font-size:19px;
    color:rgba(255,255,255,.9);text-shadow:0 2px 6px rgba(0,0,0,.7);line-height:1;
    background:rgba(0,0,0,.4);padding:3px 8px;border-radius:8px;backdrop-filter:blur(4px)}
  body.edit .thumb .num{display:none}
  .thumb .tools{position:absolute;top:8px;right:8px;display:none;flex-direction:column;gap:6px}
  body.edit .thumb .tools{display:flex}
  .thumb .tools button{width:26px;height:26px;border-radius:8px;background:rgba(0,0,0,.65);
    border:none;color:#fff;font-size:13px;cursor:pointer;display:grid;place-items:center}
  .ctitle{font-size:13px;font-weight:700;margin-top:9px;line-height:1.35;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .cmeta{font-size:11px;color:var(--muted);margin-top:3px;font-weight:600}
  .addcard{flex:0 0 auto;width:148px;height:263px;border-radius:16px;scroll-snap-align:start;
    border:2px dashed var(--line);background:var(--bg2);display:grid;place-items:center;
    cursor:pointer;transition:.2s;color:var(--muted)}
  .addcard:active{transform:scale(.95);border-color:var(--fair-glow);color:var(--fair-glow)}
  .addcard .p{text-align:center;font-size:13px;font-weight:700;line-height:1.6}
  .addcard .p b{font-size:30px;display:block}
  .empty{text-align:center;padding:60px 30px;color:var(--muted)}
  .empty .em{font-size:54px;opacity:.4}
  .empty h3{color:var(--text);font-size:18px;margin:16px 0 6px;font-weight:900}
  .empty p{font-size:13px;line-height:1.7}
  .overlay{position:fixed;inset:0;z-index:100;background:rgba(4,8,6,.8);backdrop-filter:blur(6px);
    display:none;align-items:flex-end;justify-content:center}
  .overlay.on{display:flex;animation:fade .2s}
  @keyframes fade{from{opacity:0}}
  .sheet{width:100%;max-width:520px;background:var(--bg2);border:1px solid var(--line);
    border-radius:26px 26px 0 0;padding:10px 20px calc(28px + env(safe-area-inset-bottom));
    animation:slideup .28s cubic-bezier(.2,.9,.3,1);max-height:92vh;overflow-y:auto}
  @keyframes slideup{from{transform:translateY(100%)}}
  .grip{width:42px;height:5px;border-radius:3px;background:var(--line);margin:6px auto 18px}
  .sheet h3{font-size:20px;font-weight:900;margin-bottom:4px}
  .sheet .hint{font-size:12px;color:var(--muted);margin-bottom:18px;line-height:1.6}
  .field{margin-bottom:15px}
  .field label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:7px}
  .field input,.field select{width:100%;padding:14px;border-radius:13px;border:1px solid var(--line);
    background:var(--card);color:var(--text);font-size:15px;font-family:inherit;font-weight:500}
  .field input:focus,.field select:focus{outline:none;border-color:var(--fair-glow)}
  .field .tip{font-size:11px;color:var(--muted);margin-top:6px;line-height:1.5}
  .thumbrow{display:flex;gap:10px;align-items:center}
  .thumbprev{width:52px;height:92px;border-radius:10px;background:var(--card);
    border:1px solid var(--line);object-fit:cover;flex:0 0 auto}
  .btnrow{display:flex;gap:10px;margin-top:8px}
  .btn{flex:1;padding:15px;border-radius:14px;border:none;font-size:15px;font-weight:800;
    cursor:pointer;font-family:inherit;transition:.15s}
  .btn:active{transform:scale(.97)}
  .btn.primary{background:linear-gradient(120deg,var(--fair),var(--fair-glow));color:#04120a}
  .btn.ghost{background:var(--card);color:var(--muted);border:1px solid var(--line);flex:0 0 auto;padding:15px 20px}
  .fab{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(18px + env(safe-area-inset-bottom));
    z-index:60;display:flex;gap:8px;background:rgba(17,24,21,.9);backdrop-filter:blur(12px);
    border:1px solid var(--line);padding:7px;border-radius:100px;box-shadow:0 12px 40px rgba(0,0,0,.5)}
  .fab button{border:none;background:transparent;color:var(--muted);font-size:12px;font-weight:800;
    padding:11px 18px;border-radius:100px;cursor:pointer;transition:.2s;font-family:inherit;
    display:flex;align-items:center;gap:6px}
  .fab button.on,.fab button:active{background:var(--fair);color:#fff}
  .fab .ic{font-size:15px}
  .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--fair);color:#fff;padding:12px 22px;border-radius:100px;font-weight:800;
    font-size:13px;z-index:200;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap;
    box-shadow:0 10px 30px rgba(31,122,77,.5)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<header>
  <div class="brand"><span class="mark">GREEN ROOM</span><span class="sub">SHORTS</span></div>
  <button class="addbtn" onclick="openAdd()">＋</button>
</header>

<div class="hero">
  <div class="hero-ball"></div>
  <div class="hero-copy">
    <h1>연습장에서 바로 보는<br>나만의 레슨 큐레이션</h1>
    <p>클럽별로 정리한 골프 쇼츠를 넘겨보며 연습하세요</p>
    <div class="hero-stat"><b id="totalCount">0</b> LESSONS SAVED</div>
  </div>
</div>

<div class="chips" id="chips"></div>
<div id="content"></div>

<div class="fab">
  <button id="editBtn" onclick="toggleEdit()"><span class="ic">✏️</span>편집</button>
  <button onclick="exportData()"><span class="ic">💾</span>백업</button>
  <button onclick="importData()"><span class="ic">📥</span>복원</button>
</div>

<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="grip"></div>
    <h3 id="sheetTitle">레슨 추가</h3>
    <p class="hint">인스타/페북 릴스 링크를 붙여넣으세요. 썸네일은 캡처 이미지 URL을 넣으면 카드에 보여요. (없어도 됩니다)</p>
    <div class="field"><label>레슨 제목</label>
      <input id="fTitle" placeholder="예) 드라이버 스웨이 잡는 법"></div>
    <div class="field"><label>클럽 카테고리</label>
      <select id="fCat">
        <option value="unsorted">미분류</option>
        <option value="driver">드라이버</option>
        <option value="wood">우드 / 유틸</option>
        <option value="iron">아이언</option>
        <option value="wedge">웨지 / 어프로치</option>
        <option value="putter">퍼팅</option>
        <option value="swing">스윙 기본기</option>
        <option value="etc">기타 / 멘탈</option>
      </select></div>
    <div class="field"><label>쇼츠 링크 (릴스 URL)</label>
      <input id="fUrl" placeholder="https://www.facebook.com/share/r/..."></div>
    <div class="field"><label>썸네일 이미지 URL (선택)</label>
      <div class="thumbrow">
        <img class="thumbprev" id="fPrev" alt="">
        <input id="fThumb" placeholder="이미지 주소 (선택)" oninput="prev()">
      </div>
      <p class="tip">💡 릴스 화면을 캡처해 이미지 주소를 넣으면 넷플릭스처럼 썸네일이 떠요. 비워두면 예쁜 기본 카드가 자동 생성됩니다.</p>
    </div>
    <input type="hidden" id="fId">
    <div class="btnrow">
      <button class="btn ghost" onclick="closeSheet()">취소</button>
      <button class="btn primary" onclick="saveLesson()">저장하기</button>
    </div>
  </div>
</div>

<input type="file" id="fileInput" accept="application/json" style="display:none" onchange="handleImport(event)">
<div class="toast" id="toast"></div>

<script>
/* ===== 초기 링크 (깃허브 배포용 프리로드) ===== */
const SEED_LINKS = [
  "https://www.facebook.com/share/r/1GFNNrwzN5/",
  "https://www.facebook.com/share/r/19Tr4Hp6FE/",
  "https://www.facebook.com/share/r/1AU4PwEcnE/",
  "https://www.facebook.com/share/r/1D4bbb6WXM/",
  "https://www.facebook.com/share/r/14oRs419m6c/",
  "https://www.facebook.com/share/r/1Jajm38hJ4/",
  "https://www.facebook.com/share/r/14wPuVhBAut/",
  "https://www.facebook.com/share/r/1HBjRpQjCJ/",
  "https://www.facebook.com/share/v/14gbqT9JtDo/",
  "https://www.facebook.com/share/r/1DDBRpaM2F/",
  "https://www.facebook.com/share/r/18sWNRPvvn/",
  "https://www.facebook.com/share/r/1CJyk7Yyo4/",
  "https://www.facebook.com/share/r/1CtSCPAmKa/",
  "https://www.facebook.com/share/r/17FMdCwKpy/",
  "https://www.facebook.com/share/r/196jZNiqUV/",
  "https://www.facebook.com/share/r/1EGSk3HHpK/",
  "https://www.facebook.com/share/r/1Gdpig4syE/",
  "https://www.facebook.com/share/r/1CyzCSNx62/",
  "https://www.facebook.com/share/r/1GJPSrtjdq/"
];

const CATS = [
  {id:'all',     name:'전체',         ic:'🏌️'},
  {id:'unsorted',name:'미분류',       ic:'📥'},
  {id:'driver',  name:'드라이버',     ic:'🚀'},
  {id:'wood',    name:'우드/유틸',    ic:'🌲'},
  {id:'iron',    name:'아이언',       ic:'🎯'},
  {id:'wedge',   name:'웨지/어프로치',ic:'⛳'},
  {id:'putter',  name:'퍼팅',        ic:'🥅'},
  {id:'swing',   name:'스윙 기본기',  ic:'🔄'},
  {id:'etc',     name:'기타/멘탈',    ic:'🧠'},
];
const KEY='greenroom_lessons_v2';
let lessons = load();
let filter='all', editMode=false;

function load(){
  try{
    const saved=JSON.parse(localStorage.getItem(KEY));
    if(saved && Array.isArray(saved) && saved.length) return saved;
  }catch(e){}
  return SEED_LINKS.map((url,i)=>({
    id:id(), title:'레슨 '+(i+1)+' — 제목을 입력하세요', cat:'unsorted', url, thumb:''
  }));
}
function save(){ localStorage.setItem(KEY, JSON.stringify(lessons)); render(); }
function id(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function catName(c){const f=CATS.find(x=>x.id===c);return f?f.name:c}
function catIc(c){const f=CATS.find(x=>x.id===c);return f?f.ic:'⛳'}

/* 문자열(제목+링크)로부터 항상 같은 색을 만들어내는 해시 → 카드마다 고유 그라데이션 */
function hashHue(str){
  let h=0; for(let i=0;i<str.length;i++){ h=(h*31 + str.charCodeAt(i))>>>0; }
  return h;
}
function autoGrad(l){
  const h = hashHue((l.title||'')+(l.url||l.id));
  // 골프장 팔레트: 그린 계열을 중심으로 톤을 다양화 (0~360 전체가 아니라 자연 계열로 매핑)
  const base = 90 + (h % 160);          // 90~250 (그린~틸~블루~퍼플 언저리)
  const hue1 = base;
  const hue2 = (base + 28) % 360;
  const sat  = 32 + (h>>3) % 22;        // 32~54%
  const lig1 = 20 + (h>>5) % 8;         // 진한 쪽
  const lig2 = 9  + (h>>7) % 6;         // 더 진한 쪽
  return `--g1:hsl(${hue1} ${sat}% ${lig1}%);--g2:hsl(${hue2} ${sat+6}% ${lig2}%)`;
}

function render(){
  document.getElementById('totalCount').textContent = lessons.length;
  const chips=document.getElementById('chips');
  chips.innerHTML=CATS.map(c=>{
    const n=c.id==='all'?lessons.length:lessons.filter(l=>l.cat===c.id).length;
    if(c.id!=='all' && c.id!=='unsorted' && n===0 && filter!==c.id) return '';
    return `<div class="chip ${filter===c.id?'on':''}" onclick="setFilter('${c.id}')">${c.ic} ${c.name}${n?` <span style="opacity:.6">${n}</span>`:''}</div>`;
  }).join('');

  const content=document.getElementById('content');
  if(lessons.length===0){
    content.innerHTML=`<div class="empty"><div class="em">⛳</div>
      <h3>저장된 레슨이 없어요</h3><p>＋ 버튼으로 골프 쇼츠 링크를 담아보세요.</p>
      <div style="margin-top:24px;display:flex;justify-content:center">
      <div class="addcard" onclick="openAdd()"><div class="p"><b>＋</b>레슨 추가</div></div></div></div>`;
    return;
  }
  const groups = filter==='all'
    ? CATS.filter(c=>c.id!=='all').map(c=>({c,items:lessons.filter(l=>l.cat===c.id)})).filter(g=>g.items.length)
    : [{c:CATS.find(x=>x.id===filter),items:lessons.filter(l=>l.cat===filter)}];

  content.innerHTML=groups.map(g=>`
    <div class="row">
      <div class="row-head"><h2><span class="ic">${g.c.ic}</span>${g.c.name}</h2>
        <span class="cnt">${g.items.length}개</span></div>
      <div class="track">
        ${g.items.map((l,i)=>cardHTML(l,i)).join('')}
        <div class="addcard" onclick="openAdd('${g.c.id}')"><div class="p"><b>＋</b>추가</div></div>
      </div>
    </div>`).join('');
}

function cardHTML(l,i){
  const globalIdx = lessons.findIndex(x=>x.id===l.id)+1;
  const auto=`<div class="noimg" style="${autoGrad(l)}">
       <div><div class="auto-cat">${catName(l.cat)}</div><span class="big">${catIc(l.cat)}</span></div>
       <div><div class="auto-line"></div><div class="auto-title">${esc(l.title)}</div></div>
     </div>`;
  const thumb=l.thumb
    ? `<img src="${esc(l.thumb)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
       <div class="noimg" style="display:none;${autoGrad(l)}">
       <div><div class="auto-cat">${catName(l.cat)}</div><span class="big">${catIc(l.cat)}</span></div>
       <div><div class="auto-line"></div><div class="auto-title">${esc(l.title)}</div></div></div>`
    : auto;
  return `
  <div class="card" style="animation-delay:${i*40}ms">
    <div class="thumb" onclick="openLesson('${l.id}')">
      ${thumb}
      <div class="badge">${catIc(l.cat)} SHORTS</div>
      <div class="num">#${String(globalIdx).padStart(2,'0')}</div>
      <div class="tools">
        <button onclick="event.stopPropagation();openEdit('${l.id}')">✏️</button>
        <button onclick="event.stopPropagation();delLesson('${l.id}')">🗑</button>
      </div>
      <div class="play"><span>▶</span></div>
    </div>
    ${l.thumb ? `<div class="ctitle">${esc(l.title)}</div><div class="cmeta">${catName(l.cat)}</div>`
              : `<div class="cmeta" style="margin-top:9px">▶ 탭하면 영상 재생</div>`}
  </div>`;
}
function esc(s){return (s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}

function setFilter(c){filter=c;render()}
function openLesson(lid){
  const l=lessons.find(x=>x.id===lid); if(!l)return;
  if(editMode){ openEdit(lid); return; }
  if(l.url) window.open(l.url,'_blank'); else openEdit(lid);
}
function openAdd(cat){
  document.getElementById('sheetTitle').textContent='레슨 추가';
  document.getElementById('fId').value='';
  document.getElementById('fTitle').value='';
  document.getElementById('fUrl').value='';
  document.getElementById('fThumb').value='';
  document.getElementById('fCat').value=(cat&&cat!=='all')?cat:'unsorted';
  prev(); showSheet();
}
function openEdit(lid){
  const l=lessons.find(x=>x.id===lid); if(!l)return;
  document.getElementById('sheetTitle').textContent='레슨 편집';
  document.getElementById('fId').value=l.id;
  document.getElementById('fTitle').value=l.title;
  document.getElementById('fUrl').value=l.url;
  document.getElementById('fThumb').value=l.thumb||'';
  document.getElementById('fCat').value=l.cat;
  prev(); showSheet();
}
function saveLesson(){
  const title=document.getElementById('fTitle').value.trim();
  if(!title){toast('제목을 입력해주세요');return}
  const obj={
    id:document.getElementById('fId').value||id(),
    title, url:document.getElementById('fUrl').value.trim(),
    cat:document.getElementById('fCat').value,
    thumb:document.getElementById('fThumb').value.trim()
  };
  const idx=lessons.findIndex(x=>x.id===obj.id);
  if(idx>=0) lessons[idx]=obj; else lessons.push(obj);
  save(); closeSheet(); toast('저장되었습니다 ⛳');
}
function delLesson(lid){
  if(!confirm('이 레슨을 삭제할까요?'))return;
  lessons=lessons.filter(x=>x.id!==lid); save(); toast('삭제되었습니다');
}
function toggleEdit(){
  editMode=!editMode;
  document.body.classList.toggle('edit',editMode);
  document.getElementById('editBtn').classList.toggle('on',editMode);
  toast(editMode?'편집 모드: 카드의 ✏️로 제목·클럽 수정':'편집 종료');
}
function prev(){
  const v=document.getElementById('fThumb').value.trim();
  const img=document.getElementById('fPrev');
  if(v){img.src=v;img.style.display='block'}else{img.style.display='none'}
}
function exportData(){
  const data=JSON.stringify(lessons,null,2);
  const blob=new Blob([data],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='greenroom-lessons-'+new Date().toISOString().slice(0,10)+'.json';
  a.click(); toast('백업 파일이 저장되었습니다 💾');
}
function importData(){document.getElementById('fileInput').click()}
function handleImport(e){
  const file=e.target.files[0]; if(!file)return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const arr=JSON.parse(r.result);
      if(!Array.isArray(arr))throw 0;
      lessons=arr.map(l=>({id:l.id||id(),title:l.title||'제목없음',url:l.url||'',cat:l.cat||'unsorted',thumb:l.thumb||''}));
      save(); toast('복원 완료! '+arr.length+'개 불러옴');
    }catch(err){toast('파일을 읽을 수 없어요')}
  };
  r.readAsText(file); e.target.value='';
}
function showSheet(){document.getElementById('overlay').classList.add('on')}
function closeSheet(){document.getElementById('overlay').classList.remove('on')}
document.getElementById('overlay').addEventListener('click',e=>{if(e.target.id==='overlay')closeSheet()});
let toastT;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2000);
}
render();
</script>
</body>
</html>
